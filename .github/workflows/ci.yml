name: verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
          - name: Windows 11
            os: windows-latest
          - name: macOS
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3
      - name: Install FFmpeg on Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install FFmpeg on Windows
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y --no-progress
      - name: Install FFmpeg on macOS
        if: runner.os == 'macOS'
        run: brew install ffmpeg
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run scripts/validate-repo.ts

  packaged-runtimes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compressed runtime formats
        run: |
          set -eu
          for archive in plugins/teach/bin/*.gz; do
            gzip -t "$archive"
            gzip -dc "$archive" | file -
          done
          file plugins/teach/bin/teach-mcp.exe
